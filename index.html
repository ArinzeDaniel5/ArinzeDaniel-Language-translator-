<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="Width=device-width,
    initial-scale=1.0">
    <title>ArinzeDaniel Language Translator</title>
    <link rel="stylesheet"href="style.css">
</head>
<body>
    <div class="translator-container">
        <h1>ArinzeDaniel Language Translator</h1>
        <textarea id="inputText"placeholder="Type text here..."></textarea>
        <div class="selectors">
            <select id="sourceLang">
                <option value="Disabled Selected">source Langage</option>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="zh">Chinese</option>
            </select>
            <select id="targetLang">
                <option value="Disabled Selected">Target Language</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="zh">Chinese</option>
            </select>
        </div>
        <button id="translateBtn">Translate</button>
        <textarea id="outputText"placeholder="Translation will appear here..."readonly></textarea>
    </div>
    <script src="script.js"></script>
</body>
</html>
